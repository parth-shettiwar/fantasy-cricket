databases:
  - name: fantasy-cricket-db
    plan: free
    databaseName: fantasy_cricket

services:
  - type: web
    name: fantasy-cricket
    plan: free
    runtime: python
    buildCommand: ./build.sh
    startCommand: cd backend && python -m app.seed && gunicorn app.main:app --workers 2 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fantasy-cricket-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.11"
      - key: NODE_VERSION
        value: "18"
